name: capstone
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pytorch=1.12.1
  - torchvision=0.13.1
  - torchaudio=0.12.1
  - cpuonly
  - numpy>=1.21.0,<1.24.0
  - pandas>=1.3.0
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  - scikit-learn>=1.0.0
  - scipy>=1.7.0
  - pillow>=9.0.0
  - opencv
  - jupyter
  - notebook
  - ipykernel
  - pip
  - pip:
    - pydicom>=2.3.0
    - albumentations==1.3.0
    - openmim
    - mmcv-full==1.7.1
    - mmdet==2.28.2
    - ultralytics==8.3.6
    - timm
    - einops
    - efficientnet-pytorch
    - plotly>=5.0.0
    - grad-cam>=1.4.0
    - black
    - flake8
    - pytest
    - pytest-cov
    - tqdm>=4.62.0
    - pyyaml>=6.0
    - tensorboard
    - wandb
    - streamlit>=1.20.0
    - streamlit-drawable-canvas